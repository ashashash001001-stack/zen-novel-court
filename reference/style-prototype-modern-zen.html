<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Zen - App Store Style Prototype</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            /* --- 色彩系统：暖白象牙调 --- */
            --m-bg: #FDFBF7;
            --m-surface: #FFFFFF;
            --m-glass: rgba(253, 251, 247, 0.65);
            --m-accent: #Cfb997;
            --m-accent-dark: #a39171;
            --m-text: #2C2A25;
            --m-muted: #8C867B;
            --m-border-subtle: rgba(163, 145, 113, 0.12);
            --m-border-highlight: rgba(255, 255, 255, 0.6);

            /* --- 质感系统：三重柔光阴影 --- */
            --m-shadow-float: 
                0 8px 30px -12px rgba(163, 145, 113, 0.15),
                0 4px 12px -4px rgba(163, 145, 113, 0.10),
                0 1px 2px 0 rgba(163, 145, 113, 0.05);
            
            --m-shadow-hover: 
                0 12px 40px -12px rgba(163, 145, 113, 0.20),
                0 6px 16px -4px rgba(163, 145, 113, 0.15),
                0 2px 4px 0 rgba(163, 145, 113, 0.08);

            /* --- 动效系统：iOS 弹性曲线 --- */
            --m-ease-elastic: cubic-bezier(0.34, 1.56, 0.64, 1);
            --m-ease-smooth: cubic-bezier(0.2, 0.8, 0.2, 1);
            --m-duration-fast: 0.25s;
            --m-duration-slow: 0.6s;

            --m-radius-lg: 24px;
            --m-radius-sm: 12px;
        }

        body {
            background-color: var(--m-bg);
            margin: 0;
            padding: 0;
            font-family: var(--font-sans);
            color: var(--m-text);
            -webkit-font-smoothing: antialiased;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.06'/%3E%3C/svg%3E");
            background-attachment: fixed;
        }

        /* Paper Grain Overlay - 降低噪点强度更精致 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .app-shell {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: transparent;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Header - Apple Style Glass with Warm Tone */
        .modern-header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            margin: -20px -20px 24px -20px;
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            background: var(--m-glass);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 20px -4px rgba(163, 145, 113, 0.08);
            transition: all var(--m-duration-fast) var(--m-ease-smooth);
        }
        .modern-header h1 {
            font-family: var(--font-serif);
            font-size: 24px;
            margin: 0;
            color: var(--m-text);
            letter-spacing: -0.02em;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--m-accent), var(--m-accent-dark));
            border: 2px solid white;
            box-shadow: var(--m-shadow-float);
            transition: transform var(--m-duration-fast) var(--m-ease-elastic);
        }
        .user-avatar:hover {
            transform: scale(1.05);
        }

        /* Hero Card - App Store Featured Style with Layered Shadow */
        .hero-card {
            background: var(--m-surface);
            border-radius: var(--m-radius-lg);
            padding: 32px;
            margin-bottom: 32px;
            box-shadow: 
                inset 0 1px 0 0 var(--m-border-highlight),
                var(--m-shadow-float);
            transition: 
                transform var(--m-duration-fast) var(--m-ease-elastic), 
                box-shadow var(--m-duration-fast) var(--m-ease-smooth),
                border-color var(--m-duration-fast) var(--m-ease-smooth);
            cursor: pointer;
            border: 1px solid rgba(163, 145, 113, 0.06);
            position: relative;
            overflow: hidden;
        }
        .hero-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: var(--m-shadow-hover);
            border-color: rgba(163, 145, 113, 0.15);
        }
        .hero-card:active {
            transform: scale(0.96);
            transition: transform 0.1s var(--m-ease-elastic);
        }
        .hero-card .tag {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, var(--m-accent), var(--m-accent-dark));
            color: white;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .hero-card h2 {
            font-family: var(--font-serif);
            font-size: 32px;
            margin: 0 0 12px 0;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }
        .hero-card p {
            font-size: 15px;
            color: var(--m-muted);
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .hero-card .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--m-text);
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all var(--m-duration-fast) var(--m-ease-elastic);
            border: 1px solid transparent;
        }
        .hero-card .btn:hover {
            background: var(--m-surface);
            color: var(--m-text);
            border-color: var(--m-accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(163, 145, 113, 0.15);
        }

        /* Section Title */
        .section-title {
            font-family: var(--font-serif);
            font-size: 20px;
            font-weight: 600;
            margin: 32px 0 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: -0.02em;
        }
        .section-title a {
            font-family: var(--font-sans);
            font-size: 14px;
            color: var(--m-accent-dark);
            text-decoration: none;
            font-weight: 500;
            transition: color var(--m-duration-fast) var(--m-ease-smooth);
        }
        .section-title a:hover {
            color: var(--m-text);
        }

        /* Bento Grid for Categories */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        .bento-item {
            background: var(--m-surface);
            border-radius: var(--m-radius-lg);
            padding: 20px;
            box-shadow: 
                inset 0 1px 0 0 var(--m-border-highlight),
                var(--m-shadow-float);
            border: 1px solid rgba(163, 145, 113, 0.06);
            transition: 
                transform var(--m-duration-fast) var(--m-ease-elastic), 
                box-shadow var(--m-duration-fast) var(--m-ease-smooth),
                border-color var(--m-duration-fast) var(--m-ease-smooth);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 120px;
        }
        .bento-item:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: var(--m-shadow-hover);
            border-color: rgba(163, 145, 113, 0.15);
        }
        .bento-item:active {
            transform: scale(0.96);
            transition: transform 0.1s var(--m-ease-elastic);
        }
        .bento-item.wide {
            grid-column: span 2;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
        }
        .bento-item .icon {
            font-size: 24px;
            margin-bottom: 12px;
        }
        .bento-item .name {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.02em;
        }

        /* List View - App Store Style */
        .modern-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .modern-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            background: var(--m-surface);
            border-radius: var(--m-radius-sm);
            box-shadow: 
                inset 0 1px 0 0 var(--m-border-highlight),
                0 2px 8px -2px rgba(163, 145, 113, 0.1);
            border: 1px solid rgba(163, 145, 113, 0.06);
            transition: 
                transform var(--m-duration-fast) var(--m-ease-elastic), 
                border-color var(--m-duration-fast) var(--m-ease-smooth),
                box-shadow var(--m-duration-fast) var(--m-ease-smooth);
            cursor: pointer;
        }
        .modern-item:hover {
            transform: translateX(4px);
            border-color: var(--m-accent);
            box-shadow: 
                0 4px 12px -2px rgba(163, 145, 113, 0.15);
        }
        .modern-item:active {
            transform: scale(0.98) translateX(2px);
            transition: transform 0.1s var(--m-ease-elastic);
        }
        .modern-item .cover {
            width: 50px;
            height: 70px;
            background: linear-gradient(135deg, var(--m-accent), var(--m-accent-dark));
            border-radius: 6px;
            box-shadow: 0 4px 10px -2px rgba(163, 145, 113, 0.2);
            flex-shrink: 0;
        }
        .modern-item .info {
            flex: 1;
        }
        .modern-item .info .title {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }
        .modern-item .info .meta {
            font-size: 12px;
            color: var(--m-muted);
            font-weight: 500;
        }
        .modern-item .action-btn {
            padding: 6px 12px;
            border-radius: 100px;
            background: var(--m-bg);
            border: 1px solid var(--m-border-subtle);
            font-size: 12px;
            font-weight: 600;
            color: var(--m-text);
            transition: all var(--m-duration-fast) var(--m-ease-elastic);
        }
        .modern-item .action-btn:hover {
            background: var(--m-surface);
            border-color: var(--m-accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(163, 145, 113, 0.15);
        }

        /* Progressive Reveal Animation */
        .animate-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp var(--m-duration-slow) var(--m-ease-smooth) forwards;
        }

        .hero-card { animation-delay: 0.1s; }
        .section-title:nth-of-type(1) { animation-delay: 0.2s; }
        .bento-grid { animation-delay: 0.25s; }
        .section-title:nth-of-type(2) { animation-delay: 0.35s; }
        .modern-list { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Apply animation classes */
        .hero-card,
        .section-title,
        .bento-grid,
        .modern-list {
            animation-fill-mode: both;
        }

    </style>
</head>
<body>

    <div class="app-shell">
        <header class="modern-header">
            <h1>DeathNote</h1>
            <div class="user-avatar"></div>
        </header>

        <!-- Hero Section -->
        <div class="hero-card">
            <div class="tag">本月精選</div>
            <h2>象牙之塔的<br>冬日回響</h2>
            <p>在最純淨的暖白空間中，探索关于存在与虚无的文学思考。一次关于静默的深度阅读之旅。</p>
            <a href="#" class="btn">立即阅读 →</a>
        </div>

        <!-- Categories Section -->
        <div class="section-title">
            <span>探索題材</span>
            <a href="#">查看全部</a>
        </div>
        <div class="bento-grid">
            <div class="bento-item">
                <div class="icon">🔍</div>
                <div class="name">懸疑</div>
            </div>
            <div class="bento-item">
                <div class="icon">🌿</div>
                <div class="name">治癒</div>
            </div>
            <div class="bento-item wide">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div class="icon">✨</div>
                    <div class="name">奇幻文學</div>
                </div>
                <div style="font-size:12px; color:var(--m-muted);">128 本書</div>
            </div>
            <div class="bento-item">
                <div class="icon">📖</div>
                <div class="name">文學</div>
            </div>
            <div class="bento-item">
                <div class="icon">🌙</div>
                <div class="name">恐怖</div>
            </div>
        </div>

        <!-- Ranking Section -->
        <div class="section-title">
            <span>熱門排行</span>
            <a href="#">排行榜</a>
        </div>
        <div class="modern-list">
            <div class="modern-item">
                <div class="cover"></div>
                <div class="info">
                    <div class="title">鼠尾草之梦</div>
                    <div class="meta">自然主义 · 4.9⭐</div>
                </div>
                <div class="action-btn">閱讀</div>
            </div>
            <div class="modern-item">
                <div class="cover" style="background: var(--m-accent-light);"></div>
                <div class="info">
                    <div class="title">雨后苔藓笔记</div>
                    <div class="meta">静谧观察 · 4.7⭐</div>
                </div>
                <div class="action-btn">閱讀</div>
            </div>
            <div class="modern-item">
                <div class="cover" style="background: #c4b8a4;"></div>
                <div class="info">
                    <div class="title">古木的低语</div>
                    <div class="meta">文学随笔 · 4.5⭐</div>
                </div>
                <div class="action-btn">閱讀</div>
            </div>
        </div>

        <div style="height: 100px;"></div>
    </div>

</body>
</html>
